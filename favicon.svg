<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Favicon Sudoku sprite art">
  <defs>
    <rect id="px" width="4" height="4" rx="0.6" />
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9e7cf" />
      <stop offset="100%" stop-color="#cfe4fb" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="10" fill="url(#bg)" />
  <rect x="6" y="6" width="52" height="52" rx="7" fill="#ffffff" stroke="#1c3147" stroke-width="2" />

  <!-- Sudoku mini grid -->
  <g fill="#1c3147">
    <rect x="14" y="14" width="36" height="2" />
    <rect x="14" y="26" width="36" height="2" />
    <rect x="14" y="38" width="36" height="2" />
    <rect x="14" y="50" width="36" height="2" />

    <rect x="14" y="14" width="2" height="38" />
    <rect x="26" y="14" width="2" height="38" />
    <rect x="38" y="14" width="2" height="38" />
    <rect x="50" y="14" width="2" height="38" />
  </g>

  <!-- Sprite digits (pixel-art style) -->
  <g fill="#ff7a45">
    <!-- Pixel number 9 -->
    <use href="#px" x="19" y="19" />
    <use href="#px" x="23" y="19" />
    <use href="#px" x="27" y="19" />
    <use href="#px" x="31" y="19" />

    <use href="#px" x="19" y="23" />
    <use href="#px" x="31" y="23" />

    <use href="#px" x="19" y="27" />
    <use href="#px" x="23" y="27" />
    <use href="#px" x="27" y="27" />
    <use href="#px" x="31" y="27" />

    <use href="#px" x="31" y="31" />
    <use href="#px" x="31" y="35" />
    <use href="#px" x="23" y="35" />
    <use href="#px" x="27" y="35" />
  </g>

  <g fill="#007a6f">
    <!-- Accent sprite blocks -->
    <use href="#px" x="43" y="19" />
    <use href="#px" x="43" y="23" />
    <use href="#px" x="43" y="27" />

    <use href="#px" x="19" y="43" />
    <use href="#px" x="23" y="43" />
    <use href="#px" x="27" y="43" />
  </g>
</svg>
